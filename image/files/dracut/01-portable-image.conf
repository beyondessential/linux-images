# Empty rather than "no" because several upstream dracut module check()
# functions test `[[ $hostonly ]]` (non-empty) when they should test
# `[[ $hostonly == yes ]]`. `hostonly="no"` is a non-empty string, so it
# trips those checks (e.g. the 70crypt module skips itself) — sending
# crypttab/LUKS handling into a host-specific branch that fails in
# chroot. dracut's main logic checks for "yes" explicitly, so empty and
# "no" are semantically identical for selecting generic mode.
hostonly=""
