# r[image.boot.pi-power-key]
# Pi 5 has a physical power button that emits KEY_POWER on short press.
# Default systemd behaviour is `poweroff`; we ship it explicitly so the
# expected behaviour is discoverable in /etc/systemd/logind.conf.d/.
#
# To re-task the button: change HandlePowerKey to `reboot`, `suspend`, or
# `ignore` (the last lets a userspace listener on /dev/input/event* claim
# the event for application use).
#
# Note: holding the button for >5 s triggers a firmware-level hard cut
# that no Linux setting can intercept. HandlePowerKeyLongPress (10 s in
# systemd) only governs the kernel-level long-press window before that.
[Login]
HandlePowerKey=poweroff
